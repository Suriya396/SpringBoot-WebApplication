name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: '17'

jobs:

# ─────────────────────────────────────────────
# JOB 1 : BUILD + TEST
# ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4.2.2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build + Test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1


# ─────────────────────────────────────────────
# JOB 2 : SONARCLOUD
# ─────────────────────────────────────────────
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Sonar Scan
        run: |
          mvn --batch-mode --no-transfer-progress -DskipTests \
          org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
          -Dsonar.projectKey=Suriya396_SpringBoot-WebApplication \
          -Dsonar.organization=suriya396 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}


# ─────────────────────────────────────────────
# JOB 3 : OWASP CHECK
# ─────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "SpringBoot-WebApplication"
          path: "."
          format: "HTML"

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 7


# ─────────────────────────────────────────────
# JOB 4 : DOCKER BUILD + PUSH
# ─────────────────────────────────────────────
  docker:
    name: Build & Push DockerHub
    runs-on: ubuntu-latest
    needs: dependency-check

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build + Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/myapp:latest
            ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }}


# ─────────────────────────────────────────────
# JOB 5 : TRIVY SCAN
# ─────────────────────────────────────────────
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: "${{ secrets.DOCKER_USER }}/myapp:latest"
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH


# ─────────────────────────────────────────────
# JOB 6 : DEPLOY ECS
# ─────────────────────────────────────────────
  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + Push to ECR
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.ECR_REPOSITORY }}:latest

          docker build -t $IMAGE_URI -t $IMAGE_LATEST .
          docker push $IMAGE_URI
          docker push $IMAGE_LATEST

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment

      - name: Wait ECS Stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }}
