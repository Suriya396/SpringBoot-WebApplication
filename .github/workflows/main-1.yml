name: cicd Pipeline

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # -------------------------------
  # 1️⃣ Build + Test
  # -------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: mvn clean verify


  # -------------------------------
  # 2️⃣ SonarCloud Scan
  # -------------------------------
  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4.2.2

      - run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
          -Dsonar.projectKey=Suriya396_SpringBoot-WebApplication \
          -Dsonar.organization=suriya396 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}


  # -------------------------------
  # 3️⃣ Dependency Check
  # -------------------------------
  dependency-check:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "my-app"
          path: "."
          format: "HTML"


  # -------------------------------
  # 4️⃣ Docker Build & Push (DockerHub)
  # -------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: dependency-check

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Build Image
        run: |
          cd $GITHUB_WORKSPACE
          docker build -f Dockerfile -t ${{ secrets.DOCKER_USER }}/myapp:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USER }}/myapp:latest


  # -------------------------------
  # 5️⃣ Trivy Scan
  # -------------------------------
  trivy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USER }}/myapp:latest"


  # -------------------------------
  # 6️⃣ Deploy to ECS
  # -------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image to ECR
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY }}:latest
          cd $GITHUB_WORKSPACE
          docker build -f Dockerfile -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
